# stapeln.toml — layered Chainguard container build for idaptik-game.

[metadata]
name = "idaptik-game"
version = "0.1.0-alpha"
description = "IDApixiTIK game (typed-wasm target, served by nginx)."
author = "Jonathan D.A. Jewell <j.d.a.jewell@open.ac.uk>"
license = "PMPL-1.0-or-later"
registry = "ghcr.io/hyperpolymath"

[build]
containerfile = "Containerfile"
context = "."
runtime = "podman"

[layers.game-base]
description = "Chainguard Wolfi base for AffineScript build."
from = "cgr.dev/chainguard/wolfi-base:latest"  # TODO: pin @sha256
cache = true
verify = true

[layers.game-toolchain]
description = "AffineScript compiler + typed-wasm toolchain."
extends = "game-base"
packages = ["ocaml", "opam", "dune", "wabt", "git"]
commands = [
    "opam init --no-setup --disable-sandboxing",
    "opam install -y dune sedlex menhir ppx_deriving cmdliner yojson",
    "git clone --depth 1 https://github.com/hyperpolymath/affinescript /opt/affinescript",
    "cd /opt/affinescript && dune build",
]
cache = true

[layers.game-deps]
description = "Pin idaptik-contracts + idaptik-shared + idaptik-dlc-vm submodule heads."
extends = "game-toolchain"
copy = [
    { src = ".gitmodules", dst = "/build/.gitmodules" },
]
cache-key = ".gitmodules"
cache = true
workdir = "/build"

[layers.game-build]
description = "Compile all .affine modules to WasmGC."
extends = "game-deps"
copy = [
    { src = "src/", dst = "/build/src/" },
    { src = "dlc-loader/", dst = "/build/dlc-loader/" },
    { src = "raw-assets/", dst = "/build/raw-assets/" },
    { src = "public/", dst = "/build/public/" },
]
commands = [
    "/opt/affinescript/_build/default/bin/main.exe compile -o dist/game.wasm src/Main.affine",
    "/opt/affinescript/scripts/assetpack.sh raw-assets/ public/assets/",
]
artifacts = [
    { src = "/build/dist/", dst = "/build/dist/" },
    { src = "/build/public/", dst = "/build/public/" },
]

[layers.game-runtime]
description = "Nginx static-file server for SPA + WasmGC modules."
from = "cgr.dev/chainguard/nginx:latest"  # TODO: pin @sha256
copy-from = [
    { layer = "game-build", src = "/build/dist/", dst = "/usr/share/nginx/html/dist/" },
    { layer = "game-build", src = "/build/public/", dst = "/usr/share/nginx/html/" },
]
copy = [
    { src = "container/nginx.conf", dst = "/etc/nginx/conf.d/default.conf" },
]
expose = [8080]
healthcheck = { test = ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"], interval = "15s", timeout = "3s", start-period = "5s", retries = 3 }

[security]
non-root = true
read-only-root = true
no-new-privileges = true
cap-drop = ["ALL"]
seccomp-profile = "default"

[security.signing]
algorithm = "ML-DSA-87"
provider = "cerro-torre"

[security.sbom]
format = "spdx-json"
output = "sbom.spdx.json"
include-deps = true

[verify]
vordr = true
svalinn = true
scan-on-build = true
fail-on = ["critical", "high"]

[targets.development]
description = "Local development."
layers = ["game-runtime"]
env = { LOG_LEVEL = "debug" }
[targets.development.ports]
game = 8080

[targets.staging]
description = "Staging."
layers = ["game-runtime"]
env = { LOG_LEVEL = "debug" }
[targets.staging.ports]
game = 8081

[targets.production]
description = "Production."
layers = ["game-runtime"]
env = { LOG_LEVEL = "warning" }
[targets.production.ports]
game = 8080
[targets.production.service-resources]
game = { memory = "128M", cpus = "0.5" }

[targets.test]
description = "Test."
layers = ["game-runtime"]
env = { LOG_LEVEL = "debug" }

[tmpfs.game-runtime]
mounts = [
    { path = "/tmp", size = "16M" },
    { path = "/var/cache/nginx", size = "32M" },
    { path = "/run", size = "1M" },
]
